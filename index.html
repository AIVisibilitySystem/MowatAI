<!DOCTYPE html>
<html>
<head>
  <title>AI Visibility Dashboard</title>

  <style>
    body {
      font-family: Inter, system-ui, -apple-system, sans-serif;
      background: #0b1220;
      color: #e5e7eb;
      margin: 0;
    }

    .container {
      max-width: 980px;
      margin: 50px auto;
      padding: 24px;
    }

    h1 {
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 30px;
      color: #f8fafc;
    }

    form {
      background: #111827;
      padding: 20px;
      border-radius: 14px;
      border: 1px solid #1f2937;
      display: grid;
      gap: 12px;
    }

    input {
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #263041;
      background: #0b1220;
      color: white;
      outline: none;
    }

    input:focus {
      border-color: #3b82f6;
    }

    button {
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #3b82f6;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #2563eb;
    }

    button:disabled {
      opacity: 0.5;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      margin-top: 20px;
    }

    .card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 14px;
      padding: 18px;
    }

    .score {
      font-size: 56px;
      font-weight: 800;
      text-align: center;
      color: #38bdf8;
    }

    .section-title {
      margin-top: 16px;
      font-size: 14px;
      font-weight: 700;
      color: #93c5fd;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    ul {
      padding-left: 18px;
      color: #cbd5e1;
    }

    li {
      margin-bottom: 6px;
    }

    .loading {
      text-align: center;
      color: #94a3b8;
    }

    #history div {
      padding: 10px;
      border-bottom: 1px solid #1f2937;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>AI Visibility Dashboard</h1>

    <form id="form">
      <input id="name" placeholder="Business Name" required />
      <input id="location" placeholder="Location" required />
      <input id="industry" placeholder="Industry" required />
      <button id="btn" type="submit">Run Audit</button>
    </form>

    <div class="grid">

      <div id="output" class="card">
        Enter details and run an audit.
      </div>

      <div class="card">
        <div class="section-title">History</div>
        <div id="history"></div>
      </div>

    </div>
  </div>

  <script>
    const form = document.getElementById("form");
    const output = document.getElementById("output");
    const btn = document.getElementById("btn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      btn.disabled = true;
      output.innerHTML = `<div class="loading">Analyzing visibility...</div>`;

      try {
        const res = await fetch("https://mowatai.onrender.com/audit", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            name: document.getElementById("name").value,
            location: document.getElementById("location").value,
            industry: document.getElementById("industry").value
          })
        });

        const data = await res.json();
        const parsed = JSON.parse(data.result);

        output.innerHTML = `
          <div class="score">${parsed.score}</div>

          <div class="section-title">Reasons</div>
          <ul>${parsed.reasons.map(r => `<li>${r}</li>`).join("")}</ul>

          <div class="section-title">Competitors</div>
          <ul>${parsed.competitors.map(c => `<li>${c}</li>`).join("")}</ul>

          <div class="section-title">Improvements</div>
          <ul>${parsed.improvements.map(i => `<li>${i}</li>`).join("")}</ul>
        `;

        saveToHistory({
          name: document.getElementById("name").value,
          industry: document.getElementById("industry").value,
          score: parsed.score
        });

      } catch (err) {
        console.error(err);
        output.innerHTML = `<div class="loading">Error loading data</div>`;
      }

      btn.disabled = false;
    });

    function saveToHistory(item) {
      let history = JSON.parse(localStorage.getItem("history") || "[]");

      history.unshift(item);
      history = history.slice(0, 5);

      localStorage.setItem("history", JSON.stringify(history));

      renderHistory();
    }

    function renderHistory() {
      const history = JSON.parse(localStorage.getItem("history") || "[]");

      document.getElementById("history").innerHTML =
        history.map(h => `
          <div>
            <strong>${h.name}</strong> (${h.industry})<br/>
            Score: ${h.score}
          </div>
        `).join("");
    }

    renderHistory();
  </script>
</body>
</html>
