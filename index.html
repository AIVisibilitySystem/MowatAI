<!DOCTYPE html>
<html>
<head>
  <title>AI Visibility Tool</title>
</head>

<body>
  <h1>AI Visibility Audit</h1>

  <form id="form">
    <input id="name" placeholder="Business Name" required />
    <br><br>

    <input id="location" placeholder="Location" required />
    <br><br>

    <input id="industry" placeholder="Industry" required />
    <br><br>

    <button type="submit">Run Audit</button>
  </form>

  <pre id="output">Results will appear here...</pre>

  <script>
    document.getElementById("form").addEventListener("submit", async (e) => {
      e.preventDefault();

      document.getElementById("output").innerText = "Running audit...";

      try {
        const res = await fetch("https://mowatai.onrender.com/audit", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            name: document.getElementById("name").value,
            location: document.getElementById("location").value,
            industry: document.getElementById("industry").value
          })
        });

        const data = await res.json();
        console.log("DEBUG RESPONSE:", data);

        // backend returns: { result: "stringified JSON" }
        const parsed = JSON.parse(data.result);

        document.getElementById("output").innerText =
          "Score: " + parsed.score + "\n\n" +
          "Reasons:\n- " + parsed.reasons.join("\n- ") + "\n\n" +
          "Competitors:\n- " + parsed.competitors.join("\n- ") + "\n\n" +
          "Improvements:\n- " + parsed.improvements.join("\n- ");

      } catch (err) {
        console.error(err);
        document.getElementById("output").innerText =
          "Error: Failed to fetch API. Check backend is running.";
      }
    });
  </script>

</body>
</html.>
