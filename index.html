<!DOCTYPE html>
<html>
<head>
  <title>AI Visibility Dashboard</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    form {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      background: #64748b;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
    }

    .score {
      font-size: 48px;
      font-weight: bold;
      text-align: center;
      color: #38bdf8;
    }

    .section-title {
      margin-top: 20px;
      font-weight: bold;
      color: #93c5fd;
    }

    ul {
      padding-left: 20px;
    }

    .loading {
      text-align: center;
      font-style: italic;
      color: #94a3b8;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>AI Visibility Dashboard</h1>

    <form id="form">
      <input id="name" placeholder="Business Name" required />
      <input id="location" placeholder="Location" required />
      <input id="industry" placeholder="Industry" required />
      <button id="btn" type="submit">Run Audit</button>
    </form>

    <div id="output" class="card">
      Enter details and run an audit.
    </div>

    <div class="card">
      <h3>History</h3>
      <div id="history"></div>
    </div>
  </div>

  <script>
    const form = document.getElementById("form");
    const output = document.getElementById("output");
    const btn = document.getElementById("btn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      btn.disabled = true;
      output.innerHTML = `<div class="loading">Analyzing visibility...</div>`;

      try {
        const res = await fetch("https://mowatai.onrender.com/audit", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            name: document.getElementById("name").value,
            location: document.getElementById("location").value,
            industry: document.getElementById("industry").value
          })
        });

        const data = await res.json();
        const parsed = JSON.parse(data.result);

        output.innerHTML = `
          <div class="score">${parsed.score}</div>

          <div class="section-title">Reasons</div>
          <ul>${parsed.reasons.map(r => `<li>${r}</li>`).join("")}</ul>

          <div class="section-title">Competitors</div>
          <ul>${parsed.competitors.map(c => `<li>${c}</li>`).join("")}</ul>

          <div class="section-title">Improvements</div>
          <ul>${parsed.improvements.map(i => `<li>${i}</li>`).join("")}</ul>
        `;

        saveToHistory({
          name: document.getElementById("name").value,
          industry: document.getElementById("industry").value,
          score: parsed.score
        });

      } catch (err) {
        console.error(err);
        output.innerHTML = `<div class="loading">Error loading data</div>`;
      }

      btn.disabled = false;
    });

    function saveToHistory(item) {
      let history = JSON.parse(localStorage.getItem("history") || "[]");

      history.unshift(item);
      history = history.slice(0, 5);

      localStorage.setItem("history", JSON.stringify(history));

      renderHistory();
    }

    function renderHistory() {
      const history = JSON.parse(localStorage.getItem("history") || "[]");

      document.getElementById("history").innerHTML =
        history.map(h => `
          <div style="padding:10px; border-bottom:1px solid #334155">
            <strong>${h.name}</strong> (${h.industry})<br/>
            Score: ${h.score}
          </div>
        `).join("");
    }

    renderHistory();
  </script>
</body>
</html>
